name: crianex

# ─────────────────────────────────────────────────────────────────────────────
# Serviços de desenvolvimento — frontend e backend
#
# Supabase NÃO está aqui: use `supabase start` (Supabase CLI)
# que sobe Postgres, Studio, Auth, Storage e API na porta 54321.
# Após subir, copie os valores de `supabase status` para o .env
# ─────────────────────────────────────────────────────────────────────────────

services:
  frontend:
    image: node:22-alpine
    working_dir: /app
    ports:
      - '5173:5173'
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - PUBLIC_API_SSR_BASE_URL=http://backend:3000
    env_file:
      - .env
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"

  backend:
    image: node:22-alpine
    working_dir: /app
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
    env_file:
      - .env
    command: sh -c "npm install && npx tsx watch src/index.ts"

  # Microserviço de notificações (Rust). Requer DATABASE_URL (Postgres do
  # Supabase) e SUPABASE_URL/PUBLIC_SUPABASE_PUBLISHABLE_KEY no .env.
  notify:
    build:
      context: ./notify
    ports:
      - '3100:3100'
    environment:
      - NOTIFY_AUTH_MODE=supabase
      - NOTIFY_PORT=3100
      - NOTIFY_CORS_ORIGIN=http://localhost:5173,http://localhost:5174
    env_file:
      - .env
    restart: unless-stopped

volumes:
  frontend_node_modules:
  backend_node_modules:
